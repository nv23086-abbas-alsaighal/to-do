name: CD

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME || vars.DOCKERHUB_USERNAME || vars.DOCKER_USERNAME }}
      DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_TOKEN || secrets.DOCKERHUB_PASSWORD || secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate DockerHub credentials
        run: |
          if [ -z "${DOCKERHUB_USER}" ] || [ -z "${DOCKERHUB_PASS}" ]; then
            echo "Missing DockerHub credentials. Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (or supported fallback names)."
            exit 1
          fi

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ env.DOCKERHUB_PASS }}

      - name: Extract version from release tag
        id: version
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"
          VERSION="${TAG_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/to-do:${{ steps.version.outputs.version }}
            ${{ env.DOCKERHUB_USER }}/to-do:latest
