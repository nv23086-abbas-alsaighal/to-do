<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>To‑Do — Professional</title>
        <meta name="theme-color" content="#0d6efd">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="#">To‑Do</a>
                <div class="ms-auto d-flex align-items-center">
                    <button id="open-cmdr" class="btn btn-outline-light btn-sm me-2 d-flex align-items-center" aria-label="Quick actions" title="Quick actions (press Ctrl+K)">
                        <!-- magnifying glass icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-search me-1" viewBox="0 0 16 16">
                          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85zm-5.242 0a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
                        </svg>
                        <span class="d-none d-sm-inline">Quick Actions</span>
                    </button>
                </div>
            </div>
        </nav>

        <main class="container py-6">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-soft">
                        <div class="card-body">
                            <div class="mb-3 d-flex justify-content-between align-items-start">
                                <div>
                                    <h3 class="mb-0">Tasks</h3>
                                    <p class="text-muted small mb-0">Manage your to‑do list — fast and focused.</p>
                                </div>
                                <div class="d-flex align-items-center gap-2">
                                    <button id="open-cmdr" class="btn btn-outline-primary btn-sm" aria-label="Quick actions" title="Quick actions (press Ctrl+K)">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lightning-fill me-1" viewBox="0 0 16 16">
                                          <path d="M11.3 1L1 8h5v7l10.3-7H11.3z"/>
                                        </svg>
                                        <span class="d-none d-sm-inline">Quick Actions</span>
                                    </button>
                                </div>
                            </div>

                            <div class="d-flex mb-3 gap-2 align-items-center">
                                <div class="flex-grow-1 input-group shadow-sm">
                                    <input id="task-input" type="text" class="form-control form-control-lg" placeholder="Add a new task (press Enter)" aria-label="New task">
                                    <input id="task-desc" type="text" class="form-control" placeholder="Optional description">
                                    <select id="task-priority" class="form-select" style="max-width:120px">
                                        <option value="0">Priority</option>
                                        <option value="1">Low</option>
                                        <option value="2">Medium</option>
                                        <option value="3">High</option>
                                    </select>
                                    <button id="add-btn" class="btn btn-primary btn-lg d-flex align-items-center">
                                        Add
                                    </button>
                                </div>
                                <button id="clear-completed" class="btn btn-outline-secondary ms-2">Clear Completed</button>
                            </div>

                            <ul id="task-list" class="list-group list-group-flush">
                                {% for task in tasks %}
                                    <li id="task-{{ task.id }}" class="list-group-item d-flex justify-content-between align-items-center {% if task.completed %}completed{% endif %}">
                                        <div class="d-flex align-items-center gap-2">
                                            <input class="form-check-input me-2" type="checkbox" onchange="toggleTask({{ task.id }})" {% if task.completed %}checked{% endif %}>
                                            <span class="task-name">{{ task.name }}</span>
                                        </div>
                                        <div class="d-flex gap-2 align-items-center">
                                            <button class="btn btn-sm btn-outline-secondary" onclick="toggleTask({{ task.id }})">Toggle</button>
                                            <button class="btn btn-sm btn-outline-danger" onclick="deleteTask({{ task.id }})">Delete</button>
                                        </div>
                                    </li>
                                {% endfor %}
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Command palette modal -->
        <div class="modal fade" id="cmdrModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-sm modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-body">
                        <input id="cmdr-input" class="form-control mb-2" placeholder="Search tasks or run actions (e.g. 'add', 'clear')">
                        <div class="text-muted small mb-2">Hint: press <strong>Ctrl/⌘ + K</strong></div>
                        <div id="cmdr-results" class="list-group"></div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            const api = {
                list: (params='') => fetch('/api/tasks'+(params?('?'+params):'')).then(r => r.json()),
                add: (payload) => fetch('/api/tasks', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) }).then(r => r.json()),
                toggle: (id) => fetch(`/api/tasks/${id}/toggle`, { method: 'POST' }).then(r => r.json()),
                delete: (id) => fetch(`/api/tasks/${id}`, { method: 'DELETE' }).then(r => r.json()),
                clearCompleted: () => fetch('/api/tasks/clear_completed', { method: 'POST' }).then(r => r.json())
            };

            const taskInput = document.getElementById('task-input');
            const addBtn = document.getElementById('add-btn');
            const taskList = document.getElementById('task-list');
            const clearBtn = document.getElementById('clear-completed');

            function renderTasks(tasks) {
                taskList.innerHTML = '';
                tasks.forEach(t => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    if (t.completed) li.classList.add('completed');
                    li.id = `task-${t.id}`;
                    li.innerHTML = `
                        <div>
                            <input class="form-check-input me-2" type="checkbox" onchange="toggleTask(${t.id})" ${t.completed ? 'checked' : ''}>
                            <span class="task-name">${escapeHtml(t.name)}</span>
                        </div>
                        <div>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteTask(${t.id})">Delete</button>
                        </div>
                    `;
                    taskList.appendChild(li);
                });
            }

            function escapeHtml(str){ return str.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

            addBtn.addEventListener('click', () => {
                const name = taskInput.value.trim();
                const description = document.getElementById('task-desc').value.trim();
                const priority = document.getElementById('task-priority').value;
                if (!name) return;
                api.add({ name, description, priority: Number(priority) }).then(data => { taskInput.value = ''; document.getElementById('task-desc').value=''; document.getElementById('task-priority').value='0'; renderTasks(data); });
            });

            taskInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); } });

            window.toggleTask = (id) => { api.toggle(id).then(renderTasks); };
            window.deleteTask = (id) => { api.delete(id).then(renderTasks); };

            clearBtn.addEventListener('click', () => { api.clearCompleted().then(renderTasks); });

            // Command palette (cmdr)
            const cmdrModal = new bootstrap.Modal(document.getElementById('cmdrModal'));
            const cmdrInput = document.getElementById('cmdr-input');
            const cmdrResults = document.getElementById('cmdr-results');
            const openCmdrBtn = document.getElementById('open-cmdr');

            openCmdrBtn.addEventListener('click', () => { openCmdr(); });

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openCmdr(); }
            });

            function openCmdr(){
                cmdrInput.value = '';
                populateCmdr();
                cmdrModal.show();
                setTimeout(()=>cmdrInput.focus(),50);
            }

            async function populateCmdr(){
                const tasks = await api.list();
                const commands = [
                    { id: 'add_focus', title: 'Focus add input' },
                    { id: 'clear_completed', title: 'Clear completed tasks' }
                ];
                tasks.forEach(t => commands.push({ id: `toggle_${t.id}`, title: `Toggle: ${t.name}`, taskId: t.id }), commands.push({ id: `delete_${t.id}`, title: `Delete: ${t.name}`, taskId: t.id }));
                renderCmdrResults(commands);
                cmdrInput.oninput = () => filterCmdr(commands, cmdrInput.value.trim());
            }

            function renderCmdrResults(list){
                cmdrResults.innerHTML = '';
                list.forEach(item => {
                    const el = document.createElement('button');
                    el.type = 'button';
                    el.className = 'list-group-item list-group-item-action';
                    el.textContent = item.title;
                    el.onclick = () => runCmdr(item);
                    cmdrResults.appendChild(el);
                });
            }

            function filterCmdr(commands, q){
                if (!q) return renderCmdrResults(commands);
                const lower = q.toLowerCase();
                renderCmdrResults(commands.filter(c => c.title.toLowerCase().includes(lower)));
            }

            function runCmdr(item){
                cmdrModal.hide();
                if (item.id === 'add_focus') { taskInput.focus(); }
                else if (item.id === 'clear_completed') { api.clearCompleted().then(renderTasks); }
                else if (item.id.startsWith('toggle_')) { api.toggle(item.taskId).then(renderTasks); }
                else if (item.id.startsWith('delete_')) { api.delete(item.taskId).then(renderTasks); }
            }

            // search & filter controls
            const searchInput = document.createElement('input');
            searchInput.className = 'form-control me-2';
            searchInput.placeholder = 'Search tasks...';
            searchInput.style.maxWidth = '300px';
            const sortSelect = document.createElement('select');
            sortSelect.className = 'form-select';
            sortSelect.style.maxWidth = '160px';
            sortSelect.innerHTML = '<option value="">Sort</option><option value="due">Due date</option><option value="created">Created</option>';
            const filterSelect = document.createElement('select');
            filterSelect.className = 'form-select';
            filterSelect.style.maxWidth = '160px';
            filterSelect.innerHTML = '<option value="">All</option><option value="completed">Completed</option><option value="pending">Pending</option>';
            const controls = document.createElement('div'); controls.className='d-flex gap-2 mb-3'; controls.append(searchInput, sortSelect, filterSelect);
            document.querySelector('.card-body').insertBefore(controls, document.getElementById('task-list'));

            function loadAndRender(){
                const params = new URLSearchParams();
                if (searchInput.value) params.set('q', searchInput.value);
                if (filterSelect.value) params.set('status', filterSelect.value);
                if (sortSelect.value) params.set('sort', sortSelect.value);
                api.list(params.toString()).then(renderTasks);
            }

            searchInput.addEventListener('input', () => loadAndRender());
            sortSelect.addEventListener('change', () => loadAndRender());
            filterSelect.addEventListener('change', () => loadAndRender());

            // initial load
            loadAndRender();
        </script>
    </body>
</html>
